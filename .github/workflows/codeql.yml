# JavaScript/TypeScript only — avoids default setup's separate "actions" analysis
# failing on workflow-only files (e.g. dependabot.yml).
name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '25 17 * * 5'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none
          config-file: .github/codeql/codeql-config.yml

      - uses: github/codeql-action/analyze@v3
        with:
          category: javascript-typescript
