<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <rect width="1280" height="800" fill="#f8fafc"/>
  <text x="52" y="64" font-size="36" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Options - RSS Feed Manager</text>
  <rect x="52" y="96" width="1176" height="670" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="80" y="132" width="780" height="596" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="106" y="170" font-size="24" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Feeds (3)</text>
  <rect x="686" y="144" width="148" height="34" rx="8" fill="#2563eb"/>
  <text x="724" y="166" font-size="14" font-family="Arial, sans-serif" fill="#fff">Add Feed</text>
  <rect x="106" y="190" width="730" height="120" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="124" y="218" font-size="16" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Linux ISO Releases</text>
  <text x="124" y="242" font-size="13" font-family="Arial, sans-serif" fill="#475569">https://example.com/rss/linux.xml</text>
  <text x="124" y="265" font-size="13" font-family="Arial, sans-serif" fill="#334155">Regex: ubuntu|debian|fedora  |  Poll: 15 min  |  Auto-add: ON</text>
  <rect x="670" y="275" width="72" height="24" rx="6" fill="#f59e0b"/><text x="694" y="292" font-size="12" font-family="Arial, sans-serif" fill="#fff">Edit</text>
  <rect x="748" y="275" width="72" height="24" rx="6" fill="#dc2626"/><text x="766" y="292" font-size="12" font-family="Arial, sans-serif" fill="#fff">Delete</text>
  <rect x="106" y="324" width="730" height="120" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="124" y="352" font-size="16" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Private Tracker Movies</text>
  <text x="124" y="376" font-size="13" font-family="Arial, sans-serif" fill="#475569">https://tracker.example/rss.php?key=***</text>
  <text x="124" y="399" font-size="13" font-family="Arial, sans-serif" fill="#334155">Regex: 2160p|HDR  |  Category: movies  |  Save path: /data/movies</text>
  <rect x="670" y="409" width="72" height="24" rx="6" fill="#f59e0b"/><text x="694" y="426" font-size="12" font-family="Arial, sans-serif" fill="#fff">Edit</text>
  <rect x="748" y="409" width="72" height="24" rx="6" fill="#dc2626"/><text x="766" y="426" font-size="12" font-family="Arial, sans-serif" fill="#fff">Delete</text>
  <rect x="106" y="458" width="730" height="120" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="124" y="486" font-size="16" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Anime Weekly</text>
  <text x="124" y="510" font-size="13" font-family="Arial, sans-serif" fill="#475569">https://feeds.example.org/anime.xml</text>
  <text x="124" y="533" font-size="13" font-family="Arial, sans-serif" fill="#334155">Regex: season|1080p  |  Label: anime  |  Auto-start: OFF</text>
  <rect x="670" y="543" width="72" height="24" rx="6" fill="#f59e0b"/><text x="694" y="560" font-size="12" font-family="Arial, sans-serif" fill="#fff">Edit</text>
  <rect x="748" y="543" width="72" height="24" rx="6" fill="#dc2626"/><text x="766" y="560" font-size="12" font-family="Arial, sans-serif" fill="#fff">Delete</text>
  <rect x="890" y="132" width="312" height="270" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="910" y="166" font-size="20" font-family="Arial, sans-serif" fill="#1e3a8a" font-weight="700">Getting Started</text>
  <text x="910" y="196" font-size="13" font-family="Arial, sans-serif" fill="#1e40af">1. Add an RSS feed URL</text>
  <text x="910" y="220" font-size="13" font-family="Arial, sans-serif" fill="#1e40af">2. Set regex include filters</text>
  <text x="910" y="244" font-size="13" font-family="Arial, sans-serif" fill="#1e40af">3. Choose category/path defaults</text>
  <text x="910" y="268" font-size="13" font-family="Arial, sans-serif" fill="#1e40af">4. Enable auto-add and poll interval</text>
  <rect x="910" y="300" width="182" height="36" rx="8" fill="#2563eb"/>
  <text x="945" y="323" font-size="14" font-family="Arial, sans-serif" fill="#fff">Use Example Feed</text>
  <rect x="890" y="426" width="312" height="302" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="910" y="460" font-size="18" font-family="Arial, sans-serif" fill="#0f172a" font-weight="700">Advanced JSON</text>
  <rect x="910" y="476" width="270" height="180" rx="8" fill="#0f172a"/>
  <text x="926" y="506" font-size="12" font-family="monospace" fill="#93c5fd">{</text>
  <text x="942" y="528" font-size="12" font-family="monospace" fill="#a7f3d0">"pollMinutes": 15,</text>
  <text x="942" y="550" font-size="12" font-family="monospace" fill="#a7f3d0">"maxItemsPerRun": 8,</text>
  <text x="942" y="572" font-size="12" font-family="monospace" fill="#a7f3d0">"dedupeByGuid": true</text>
  <text x="926" y="594" font-size="12" font-family="monospace" fill="#93c5fd">}</text>
  <rect x="1020" y="680" width="160" height="36" rx="8" fill="#16a34a"/>
  <text x="1068" y="703" font-size="14" font-family="Arial, sans-serif" fill="#fff">Save</text>
</svg>
